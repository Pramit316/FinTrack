  <div class="dashboard-top">
    <div class="card balance">
      <h1 class="card-icon">💵</h1>
      <section class="card-content">
        <h2>Total Balance</h2>

      <section class="card-content">

        <h1>$2,450</h1>
      </section>

    <div class="card expense">

      <section class="card-content">

      </section>

  <div class="main-content">
